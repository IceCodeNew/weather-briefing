name: Container image
permissions: {}

on:
  push:
    branches:
      - "master"
    paths:
      - ".github/workflows/image.yml"
      - "weather_briefing/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:
  merge_group:

env:
  WEATHER_BRIEFING_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/weather-briefing
  WEATHER_BRIEFING_VERSION: "0.3.0"

jobs:
  weather-briefing:
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=min,scope=${{ matrix.platform }}
          outputs: |
            type=image,compression=estargz,force-compression=true,oci-mediatypes=true,name=${{ env.WEATHER_BRIEFING_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: Smoke test
        env:
          digest: ${{ steps.build.outputs.digest }}
        run: |
          test_image="${WEATHER_BRIEFING_IMAGE}@${digest}"
          docker pull "${test_image}" || true
          docker image inspect "${test_image}"
          docker run --rm --pull=never "${test_image}" --help

      - name: Export digest
        env:
          digest: ${{ steps.build.outputs.digest }}
          platform: ${{ matrix.platform }}
        run: |
          mkdir -p /tmp/weather-briefing-digests/
          touch "/tmp/weather-briefing-digests/${digest#sha256:}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: weather-briefing-digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/weather-briefing-digests/*
          if-no-files-found: error
          retention-days: 1

  weather-briefing-multiarch:
    runs-on: ubuntu-24.04
    needs:
      - weather-briefing
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/weather-briefing-digests/
          pattern: weather-briefing-digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/weather-briefing-digests/
        env:
          REGISTRY_IMAGE: ${{ env.WEATHER_BRIEFING_IMAGE }}
          WEATHER_BRIEFING_VERSION: ${{ env.WEATHER_BRIEFING_VERSION }}
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create --tag "${REGISTRY_IMAGE}:latest" --tag "${REGISTRY_IMAGE}:${WEATHER_BRIEFING_VERSION}" \
              $(printf "${REGISTRY_IMAGE}@sha256:%s " *)
      - name: Inspect image
        env:
          REGISTRY_IMAGE: ${{ env.WEATHER_BRIEFING_IMAGE }}:latest
        run: |
          docker buildx imagetools inspect "${REGISTRY_IMAGE}" \
              | grep -Po '[^ \r\n\t\v]+@sha256:[a-z0-9]+' | xargs -r -t -n 1 docker buildx imagetools inspect --raw
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "${{ env.WEATHER_BRIEFING_IMAGE }}:latest"
          format: "table"
