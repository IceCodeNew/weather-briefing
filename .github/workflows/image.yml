name: Container image
permissions: {}

on:
  push:
    branches:
      - "master"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
    paths:
      - ".github/workflows/image.yml"
      - "weather_briefing/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"

concurrency:
  group: weather-briefing-image-${{ github.workflow }}-${{ github.ref_type }}
  cancel-in-progress: true

env:
  # renovate: datasource=github-releases depName=static-curl packageName=stunnel/static-curl
  CURL_VERSION: "8.21.0"
  WEATHER_BRIEFING_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/weather-briefing

jobs:
  weather-briefing:
    if: >-
      github.ref_type == 'tag' ||
      !contains(github.event.head_commit.message, 'Weather-Briefing-Skip-Edge-Image: true')
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install static curl
        # Cache writes only run for trusted master or release tag pushes.
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # zizmor: ignore[cache-poisoning] v4.2.1
        with:
          mise_toml: |
            [tools]
            "github:stunnel/static-curl" = { version = "${{ env.CURL_VERSION }}", matching = "musl" }
      - name: Prepare static curl build context
        id: static-curl-context
        run: |
          context_path="$HOME/static-curl-context"
          mkdir -p "${context_path}"
          cp "$(mise which curl)" "${context_path}/curl"
          echo "path=${context_path}" >> "$GITHUB_OUTPUT"
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          build-contexts: static-curl=${{ steps.static-curl-context.outputs.path }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=min,scope=${{ matrix.platform }}
          outputs: |
            type=image,compression=estargz,force-compression=true,oci-mediatypes=true,name=${{ env.WEATHER_BRIEFING_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: Smoke test
        env:
          digest: ${{ steps.build.outputs.digest }}
        run: |
          test_image="${WEATHER_BRIEFING_IMAGE}@${digest}"
          docker pull "${test_image}" || true
          docker image inspect "${test_image}"
          docker run --rm --pull=never "${test_image}" --help
          docker run --rm --pull=never --entrypoint /usr/bin/curl "${test_image}" --version \
            | grep -F "curl ${CURL_VERSION}"

      - name: Export digest
        env:
          digest: ${{ steps.build.outputs.digest }}
          platform: ${{ matrix.platform }}
        run: |
          mkdir -p /tmp/weather-briefing-digests/
          touch "/tmp/weather-briefing-digests/${digest#sha256:}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: weather-briefing-digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/weather-briefing-digests/*
          if-no-files-found: error
          retention-days: 1

  weather-briefing-multiarch:
    runs-on: ubuntu-24.04
    needs:
      - weather-briefing
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/weather-briefing-digests/
          pattern: weather-briefing-digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/weather-briefing-digests/
        env:
          COMMIT_TAG: sha-${{ github.sha }}
          REGISTRY_IMAGE: ${{ env.WEATHER_BRIEFING_IMAGE }}
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          digest_files=(*)
          if (( ${#digest_files[@]} == 0 )); then
            echo "No platform digest artifacts were downloaded"
            exit 1
          fi
          sources=()
          for digest_file in "${digest_files[@]}"; do
            if ! [[ "${digest_file}" =~ ^[a-f0-9]{64}$ ]]; then
              echo "Unexpected digest artifact filename: ${digest_file}"
              exit 1
            fi
            sources+=("${REGISTRY_IMAGE}@sha256:${digest_file}")
          done

          tags=(--tag "${REGISTRY_IMAGE}:${COMMIT_TAG}")
          if [[ -n "${RELEASE_VERSION}" ]]; then
            tags+=(
              --tag "${REGISTRY_IMAGE}:${RELEASE_VERSION}"
              --tag "${REGISTRY_IMAGE}:latest"
              --tag "${REGISTRY_IMAGE}:edge"
            )
          else
            tags+=(--tag "${REGISTRY_IMAGE}:edge")
          fi
          docker buildx imagetools create "${tags[@]}" "${sources[@]}"
      - name: Inspect image
        env:
          REGISTRY_IMAGE: ${{ env.WEATHER_BRIEFING_IMAGE }}:sha-${{ github.sha }}
        run: |
          docker buildx imagetools inspect "${REGISTRY_IMAGE}" \
              | grep -Po '[^ \r\n\t\v]+@sha256:[a-z0-9]+' | xargs -r -t -n 1 docker buildx imagetools inspect --raw
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "${{ env.WEATHER_BRIEFING_IMAGE }}:sha-${{ github.sha }}"
          format: "table"
